services:
  rednote-downloader:
    image: icekale/rednote-downloader:v0.2.23
    container_name: rednote-downloader
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      DOWNLOAD_DIR: /data/downloads
      APP_CONFIG_PATH: /data/config/.rednote-config.json
      APP_STATE_PATH: /data/config/.rednote-state.json
      XHS_COOKIE: ${XHS_COOKIE:-}
      XHS_USER_AGENT: ${XHS_USER_AGENT:-}
      DOUYIN_COOKIE: ${DOUYIN_COOKIE:-}
      DOUYIN_INTERNAL_DOWNLOADER_ENABLED: ${DOUYIN_INTERNAL_DOWNLOADER_ENABLED:-true}
      DOUYIN_INTERNAL_DOWNLOADER_PORT: ${DOUYIN_INTERNAL_DOWNLOADER_PORT:-8000}
      DOUYIN_DOWNLOADER_BASE_URL: ${DOUYIN_DOWNLOADER_BASE_URL:-}
      DOUYIN_DOWNLOADER_OUTPUT_DIR: ${DOUYIN_DOWNLOADER_OUTPUT_DIR:-}
      DOUYIN_DOWNLOADER_TIMEOUT_MS: ${DOUYIN_DOWNLOADER_TIMEOUT_MS:-600000}
      DOUYIN_DOWNLOADER_POLL_INTERVAL_MS: ${DOUYIN_DOWNLOADER_POLL_INTERVAL_MS:-1500}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-15000}
      BATCH_RESOLVE_CONCURRENCY: ${BATCH_RESOLVE_CONCURRENCY:-3}
      MEDIA_DOWNLOAD_CONCURRENCY: ${MEDIA_DOWNLOAD_CONCURRENCY:-3}
      MEDIA_DOWNLOAD_RETRY_COUNT: ${MEDIA_DOWNLOAD_RETRY_COUNT:-1}
      MEDIA_REQUEST_TIMEOUT_MS: ${MEDIA_REQUEST_TIMEOUT_MS:-30000}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_CHAT_IDS: ${TELEGRAM_ALLOWED_CHAT_IDS:-}
      TELEGRAM_DELIVERY_MODE: ${TELEGRAM_DELIVERY_MODE:-document}
      REDNOTE_ADMIN_TOKEN: ${REDNOTE_ADMIN_TOKEN:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      - ${REDNOTE_DATA_DIR:-/mnt/user/appdata/rednote}:/data
    restart: unless-stopped
